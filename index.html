<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李亦騰 - Personal Webpage</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f0c29;
            --bg-color-2: #302b63;
            --bg-color-3: #24243e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color), var(--bg-color-2), var(--bg-color-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating Orbs for depth */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(157, 78, 221, 0.6);
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(114, 9, 183, 0.5);
            bottom: 10%;
            right: 15%;
            animation-delay: -3s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: rgba(67, 97, 238, 0.5);
            top: 40%;
            left: 60%;
            animation-delay: -6s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            100% {
                transform: translateY(-50px) scale(1.1);
            }
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem 4rem;
            text-align: center;
            z-index: 1;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            width: 90%;
            max-width: 500px;

            /* Staggered entrance initial state */
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typography & Elements */
        .card h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;

            /* Purple Gradient Shimmer Effect */
            background: linear-gradient(to right,
                    #c77dff,
                    #dfb2ff,
                    #9d4edd,
                    #c77dff);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;

            /* Staggered entrance and fade */
            opacity: 0;
            animation: gradientText 3s linear infinite, fadeUp 0.8s ease forwards 0.2s;
        }

        @keyframes gradientText {
            to {
                background-position: 200% center;
            }
        }

        .clock-container {
            margin: 2.5rem 0 1rem 0;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.4s;
        }

        .time {
            font-family: 'Outfit', sans-serif;
            font-size: 4.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 0.5rem;
            font-variant-numeric: tabular-nums;
            /* Keeps numbers from shifting width */
        }

        .date {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Responsive Layout */
        @media (max-width: 600px) {
            .card {
                padding: 2.5rem 1.5rem;
            }

            .card h1 {
                font-size: 2.8rem;
            }

            .time {
                font-size: 3.5rem;
            }

            .date {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Floating Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main Content Card -->
    <div class="card">
        <h1>李亦騰</h1>

        <div class="clock-container">
            <div class="time" id="timeDisplay">00:00:00</div>
            <div class="date" id="dateDisplay">Loading date...</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // Format Time (HH:MM:SS)
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            // Add leading zero if needed
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;

            // Format Date (e.g., Tuesday, February 24, 2026)
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = now.toLocaleDateString('en-US', options);

            document.getElementById('dateDisplay').textContent = formattedDate;
        }

        // Initialize clock immediately and update every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>

</html>
